<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>JSON Pretty-Print and Minify</title>
  <meta name="description" content="Paste raw JSON and beautify it with your chosen indent, minify it to one line, or sort its keys. Copy or download the result. Runs entirely offline in your browser.">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#fbfbfd">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="page">
    <header class="masthead">
      <span class="brandmark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5c0 1.1.9 2 2 2h1"></path>
          <path d="M16 21h1a2 2 0 0 0 2-2v-5c0-1.1.9-2 2-2a2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1"></path>
        </svg>
      </span>
      <h1 class="masthead__title">JSON Pretty-Print and Minify</h1>
      <p class="masthead__help" id="help">Paste raw JSON, then beautify or minify it. Everything runs locally in your browser.</p>
    </header>

    <main id="main" class="tool">
      <section class="panel" aria-labelledby="input-label">
        <div class="panel__head">
          <label class="panel__label" id="input-label" for="input">Input</label>
        </div>
        <textarea
          id="input"
          class="editor"
          spellcheck="false"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          aria-describedby="help"
          placeholder='{"name": "value", "items": [1, 2, 3]}'></textarea>
      </section>

      <section class="controls" aria-label="Transform options">
        <div class="controls__actions">
          <button type="button" id="beautify" class="btn btn--primary">Beautify</button>
          <button type="button" id="minify" class="btn btn--secondary">Minify</button>
        </div>
        <div class="controls__options">
          <div class="field">
            <label class="field__label" for="indent">Indent</label>
            <select id="indent" class="select">
              <option value="2">2 spaces</option>
              <option value="4">4 spaces</option>
              <option value="tab">Tab</option>
            </select>
          </div>
          <label class="checkbox" for="sortKeys">
            <input type="checkbox" id="sortKeys" class="checkbox__input">
            <span class="checkbox__box" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 6 9 17l-5-5"></path>
              </svg>
            </span>
            <span class="checkbox__label">Sort keys</span>
          </label>
        </div>
      </section>

      <section class="panel panel--output" aria-labelledby="output-label">
        <div class="panel__head">
          <label class="panel__label" id="output-label" for="output">Output</label>
        </div>
        <textarea
          id="output"
          class="editor editor--output"
          readonly
          spellcheck="false"
          placeholder="The formatted result appears here."></textarea>
        <div class="controls__result">
          <button type="button" id="copy" class="btn btn--ghost">Copy</button>
          <button type="button" id="download" class="btn btn--ghost">Download .json</button>
        </div>
      </section>

      <p id="status" class="status" role="status" aria-live="polite" data-state="neutral">
        <span class="status__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M12 8h.01"></path>
            <path d="M11 12h1v4h1"></path>
          </svg>
        </span>
        <span class="status__text">Paste some JSON to begin.</span>
      </p>
    </main>

    <footer class="colophon">
      <p>Runs entirely in your browser. No server, no network, nothing leaves your device.</p>
    </footer>
  </div>

  <script src="assets/js/tool.js"></script>
</body>
</html>
